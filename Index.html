<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verdant — Premium Plant Nursery</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&family=Italiana&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ========== LOADER ========== -->
  <div id="page-loader">
    <div class="loader-content">
      <svg class="loader-icon" width="52" height="60" viewBox="0 0 52 60" fill="none">
        <path d="M26 4C26 4 6 16 6 34C6 46.15 14.954 56 26 56C37.046 56 46 46.15 46 34C46 16 26 4 26 4Z" stroke="white" stroke-width="1.4" fill="white" fill-opacity="0.08"/>
        <line x1="26" y1="56" x2="26" y2="24" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M26 38C26 38 17 31 12 23" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <path d="M26 32C26 32 33 27 39 20" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <p class="loader-name">VERDANT</p>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>
  </div>

  <!-- ========== NAVBAR ========== -->
  <nav id="navbar">
    <div class="nav-inner">
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <a href="#" class="logo" onclick="navigate('home')">
        <svg class="logo-mark" width="20" height="24" viewBox="0 0 20 24" fill="none">
          <path d="M10 2C10 2 1 8.5 1 16C1 20.97 5.03 25 10 25C14.97 25 19 20.97 19 16C19 8.5 10 2 10 2Z" fill="currentColor" opacity="0.12"/>
          <path d="M10 2C10 2 1 8.5 1 16C1 20.97 5.03 25 10 25C14.97 25 19 20.97 19 16C19 8.5 10 2 10 2Z" stroke="currentColor" stroke-width="1.3"/>
          <line x1="10" y1="25" x2="10" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M10 19C10 19 6 16 4 13" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
          <path d="M10 15.5C10 15.5 13.5 12.5 16 10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
        </svg>
        <span class="logo-text">VERDANT</span>
      </a>
      <div class="nav-search">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" class="nav-search-icon">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="navSearch" placeholder="Search plants, seeds, accessories…" />
      </div>
      <div class="nav-actions">
        <button class="nav-btn" onclick="navigate('shop')" title="Shop">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="5" width="16" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M6 5V4C6 2.343 7.343 1 9 1C10.657 1 12 2.343 12 4V5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
        <button class="nav-btn cart-btn" onclick="navigate('cart')" title="Cart">
          <svg width="19" height="18" viewBox="0 0 19 18" fill="none"><path d="M1 1H3.5L5.2 11H14.5L16.5 4H4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="15" r="1.5" fill="currentColor"/><circle cx="13" cy="15" r="1.5" fill="currentColor"/></svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
        <button class="nav-btn" onclick="navigate('admin')" title="Admin">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 16C2 13.239 5.134 11 9 11C12.866 11 16 13.239 16 16" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== DRAWER ========== -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-brand">
        <svg width="18" height="22" viewBox="0 0 18 22" fill="none">
          <path d="M9 2C9 2 1 7 1 14C1 18.418 4.582 22 9 22C13.418 22 17 18.418 17 14C17 7 9 2 9 2Z" stroke="white" stroke-width="1.2" fill="white" fill-opacity="0.15"/>
          <line x1="9" y1="22" x2="9" y2="10" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M9 16C9 16 5.5 13.5 4 11" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
          <path d="M9 13C9 13 12 11 14.5 8.5" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <span>VERDANT</span>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <nav class="drawer-nav">
      <a href="#" class="drawer-link" onclick="navigate('home');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 7L8 1L15 7V15H10V10H6V15H1V7Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Home
      </a>
      <a href="#" class="drawer-link" onclick="navigate('shop');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="14" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M5 5V4C5 2.343 6.343 1 8 1C9.657 1 11 2.343 11 4V5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Shop
      </a>
      <a href="#" class="drawer-link" onclick="scrollToSection('categories');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="0.8" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="1" width="6" height="6" rx="0.8" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="6" rx="0.8" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="6" rx="0.8" stroke="currentColor" stroke-width="1.2"/></svg>
        Categories
      </a>
      <a href="#" class="drawer-link" onclick="scrollToSection('about');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M8 7.5V11.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="8" cy="5" r="0.8" fill="currentColor"/></svg>
        About
      </a>
      <a href="#" class="drawer-link" onclick="scrollToSection('contact');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 5L8 9L15 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Contact
      </a>
      <a href="#" class="drawer-link" onclick="navigate('cart');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 1H3L4.5 10H12.5L14 4H3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="13.5" r="1.2" fill="currentColor"/><circle cx="11" cy="13.5" r="1.2" fill="currentColor"/></svg>
        My Cart
      </a>
      <a href="#" class="drawer-link" onclick="navigate('admin');closeDrawer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M2 15C2 12.239 4.686 10 8 10C11.314 10 14 12.239 14 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Admin Panel
      </a>
    </nav>
    <div class="drawer-footer">
      <p>Every plant finds its person.</p>
    </div>
  </aside>

  <!-- ========== MAIN APP CONTAINER ========== -->
  <main id="app"></main>

  <!-- ========== TOAST ========== -->
  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
